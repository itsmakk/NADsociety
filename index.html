<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NAD Society</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      margin: 0;
      color: #2c3e50;
    }

    p {
      color: #666;
      margin-top: 10px;
    }

    .status {
      margin-top: 20px;
      padding: 10px;
      background: #eafaf1;
      color: #27ae60;
      border-radius: 8px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>🚀 NAD Society System</h1>
    <p>GitHub Pages is working successfully</p>

    <div class="status">
      ✅ Website Live
    </div>
  </div>

</body>
</html>
